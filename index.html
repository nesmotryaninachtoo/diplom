<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LernaPeople — Авторизация</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <p class="auth-brand">LernaPeople</p>

    <main class="auth-layout" aria-labelledby="auth-welcome-title">
      <h1 id="auth-welcome-title" class="auth-welcome-title">Привет! Войдите или зарегистрируйтесь на платформе</h1>

      <section class="auth-card" aria-labelledby="auth-title">
        <div id="auth-chooser" class="auth-chooser">
          <button id="go-register" class="button button--primary auth-submit" type="button">Зарегистрироваться</button>
          <button id="go-login" class="button button--secondary auth-submit auth-submit--outline" type="button">Войти</button>
        </div>

        <form id="auth-form" class="auth-form auth-form--hidden" novalidate>
          <h2 id="auth-title" class="auth-form__title">Придумайте:</h2>

          <label class="auth-label" for="email">Логин</label>
          <input id="email" name="email" class="auth-input" type="email" placeholder="name@company.com" required />

          <label class="auth-label" for="password">Пароль</label>
          <input
            id="password"
            name="password"
            class="auth-input"
            type="password"
            placeholder="Минимум 8 символов"
            autocomplete="current-password"
            required
          />

          <p class="auth-hint">
            Пароль: от 8 символов, минимум 1 заглавная латинская буква и 1 цифра. Русские буквы запрещены.
          </p>

          <p id="auth-error" class="auth-message auth-message--error" aria-live="polite"></p>
          <p id="auth-success" class="auth-message auth-message--success" aria-live="polite"></p>

          <button id="auth-submit" class="button button--primary auth-submit" type="submit">Зарегистрироваться</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
