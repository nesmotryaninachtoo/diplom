<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LernaPeople — Авторизация</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-card" aria-labelledby="auth-title">
        <p class="auth-card__logo">LernaPeople</p>
        <h1 id="auth-title">Привет!</h1>
        <p class="auth-card__subtitle">
          Зарегистрируйтесь для дальнейшей работы в нашей системе.
        </p>

        <div class="auth-tabs" role="tablist" aria-label="Режим авторизации">
          <button class="auth-tab auth-tab--active" type="button" data-mode="register" role="tab" aria-selected="true">
            Зарегистрироваться
          </button>
          <button class="auth-tab" type="button" data-mode="login" role="tab" aria-selected="false">
            Войти
          </button>
        </div>

        <form id="auth-form" class="auth-form" novalidate>
          <label class="auth-label" for="email">Логин (рабочая почта)</label>
          <input id="email" name="email" class="auth-input" type="email" placeholder="name@company.com" required />

          <label class="auth-label" for="password">Пароль</label>
          <input
            id="password"
            name="password"
            class="auth-input"
            type="password"
            placeholder="Минимум 8 символов"
            autocomplete="current-password"
            required
          />

          <p class="auth-hint">
            Пароль: от 8 символов, минимум 1 заглавная латинская буква и 1 цифра. Русские буквы запрещены.
          </p>

          <p id="auth-error" class="auth-message auth-message--error" aria-live="polite"></p>
          <p id="auth-success" class="auth-message auth-message--success" aria-live="polite"></p>

          <button id="auth-submit" class="button button--primary auth-submit" type="submit">
            Зарегистрироваться
          </button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
